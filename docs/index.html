<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>2026 Masters Draft & Scoreboard</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="wrap">
    <header class="page-header">
      <h1>2026 Masters Draft & Scoreboard</h1>
      <p id="updated">Loading latest update...</p>
    </header>

    <section class="section-card">
      <h2>Team Standings</h2>
      <div id="teams-grid" class="teams-grid"></div>
    </section>

<div style="text-align:center; margin: 40px 0;">
  <img 
    src="./Masters.png" 
    alt="Masters Image"
    style="max-width:100%; width:800px; border-radius:16px; box-shadow: 0 8px 20px rgba(0,0,0,0.2);"
  >
</div>

    <section class="section-card">
  <h2>Payouts</h2>
  <div id="payouts-list"></div>
</section>

    <section class="section-card">
      <h2>All Player Scores</h2>
      <table id="scores-table">
        <thead>
          <tr>
            <th>Pos</th>
            <th>Player</th>
            <th>Score</th>
            <th>Today</th>
            <th>Thru</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
